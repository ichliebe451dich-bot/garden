<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Enter Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  transition: background 3s linear;
  background: linear-gradient(#b57cff,#d6b3ff);
}

/* DAY NIGHT */
body.night{
  background: linear-gradient(#0b0b2a,#1b1440);
}

/* ENTER */
#enterBtn{
  padding:20px 40px;
  font-size:22px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:white;
  color:#6a2bd6;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  z-index:10;
}

/* DOOR */
#door{
  position:absolute;
  width:100%;
  height:100%;
  background:#2b1b3f;
  display:none;
  justify-content:center;
  align-items:center;
  perspective:1000px;
}

.door-panel{
  width:120px;
  height:200px;
  background:#5e3a8c;
  margin:10px;
  transform-origin:left;
  animation: none;
}

#door.open .left{
  animation: openLeft 2s forwards;
}
#door.open .right{
  animation: openRight 2s forwards;
}

@keyframes openLeft{
  to{ transform: rotateY(-120deg); }
}
@keyframes openRight{
  to{ transform: rotateY(120deg); }
}

/* GARDEN */
#garden{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

.flowerBox{
  margin-top:20px;
  max-width:500px;
  font-size:18px;
  line-height:1.6;
  min-height:120px;
}

/* flowers */
.flowers{
  display:flex;
  gap:30px;
  margin-top:30px;
}

.flower{
  font-size:40px;
  cursor:pointer;
  transition:0.3s;
}

.flower:hover{
  transform:scale(1.3);
}
</style>
</head>

<body>

<button id="enterBtn">enter garden</button>

<div id="door">
  <div class="door-panel left"></div>
  <div class="door-panel right"></div>
</div>

<div id="garden">
  <h1>🌿 Welcome to our Garden</h1>

  <div class="flowers">
    <div class="flower" onclick="showText(0)">🌹</div>
    <div class="flower" onclick="showText(1)">🌷</div>
    <div class="flower" onclick="showText(2)">🌻</div>
  </div>

  <div class="flowerBox" id="text"></div>
</div>

<audio id="music" src="lagu.mp3" loop></audio>

<script>
const enterBtn = document.getElementById("enterBtn");
const door = document.getElementById("door");
const garden = document.getElementById("garden");
const textBox = document.getElementById("text");
const music = document.getElementById("music");

let night = false;

/* background cycle */
setInterval(()=>{
  night = !night;
  document.body.classList.toggle("night", night);
}, 6000);

/* enter garden */
enterBtn.onclick = () => {
  enterBtn.style.display = "none";
  door.style.display = "flex";

  setTimeout(()=>{
    door.classList.add("open");

    setTimeout(()=>{
      door.style.display = "none";
      garden.style.display = "flex";
      music.play();
    }, 2000);

  }, 300);
};

/* romantic texts */
const flowers = [
`🌹 Mawar:
Aku mungkin tidak sempurna, tapi aku akan selalu kembali padamu, seperti mawar yang tetap mekar meski berduri.`,

`🌷 Tulip:
Kalau kamu tanya kenapa aku bertahan… jawabannya sederhana, karena kamu rumah yang aku cari.`,

`🌻 Matahari:
Kalau kamu gelap, aku jadi terangmu. Kalau kamu lelah, aku jadi tenangmu.`
];

/* typing effect */
function typeText(text, i=0){
  textBox.innerHTML = "";
  function typing(){
    if(i < text.length){
      textBox.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 25);
    }
  }
  typing();
}

function showText(index){
  typeText(flowers[index]);
}
</script>

</body>
</html>
